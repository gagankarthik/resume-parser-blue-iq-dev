name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true   # cancel stale PR builds

env:
  AWS_REGION:    us-east-2
  ECR_REPO_NAME: resume-parser-production-lambda
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  # ── 1. Unit tests — fast, no AWS needed ──────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Tesseract (for OCR extractor tests)
        run: sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          pip install poetry==1.8.4
          poetry config virtualenvs.create false
          poetry install

      - name: Lint
        run: poetry run ruff check app/ tests/

      - name: Type check
        run: poetry run mypy app/ --ignore-missing-imports

      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v --tb=short
        env:
          # Use dummy values — integration tests mock DynamoDB
          AWS_ACCESS_KEY_ID:     test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION:            us-east-1
          OPENAI_API_KEY:        sk-test-key

  # ── 2. Build & push container image — runs only on main push ─────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository \
            --repository-name ${{ env.ECR_REPO_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --image-tag-mutability MUTABLE 2>/dev/null || true

      - name: Set image metadata
        id: image
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          TAG="${{ github.sha }}"
          URI="${REGISTRY}/${{ env.ECR_REPO_NAME }}:${TAG}"
          echo "uri=${URI}" >> $GITHUB_OUTPUT
          echo "Building image: ${URI}"

      - name: Build Lambda container image
        run: |
          docker build \
            -f Dockerfile.lambda \
            -t ${{ steps.image.outputs.uri }} \
            -t ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:latest \
            .

      - name: Push to ECR
        run: |
          docker push ${{ steps.image.outputs.uri }}
          docker push ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:latest

  # ── 3. Deploy to Lambda — runs only after successful image push ───────────────
  deploy:
    name: Deploy to Lambda
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.get-url.outputs.api_url }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update API Lambda image
        run: |
          aws lambda update-function-code \
            --function-name resume-parser-production-api \
            --image-uri ${{ needs.build-and-push.outputs.image_uri }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name resume-parser-production-api \
            --region ${{ env.AWS_REGION }}

      - name: Check if API Lambda update succeeded
        run: |
          if [ $? -ne 0 ]; then
            echo "Update failed, but function might already have this image"
            # Try with --publish flag as fallback
            aws lambda update-function-code \
              --function-name resume-parser-production-api \
              --image-uri ${{ needs.build-and-push.outputs.image_uri }} \
              --region ${{ env.AWS_REGION }} \
              --publish
          fi

      - name: Update Worker Lambda image
        run: |
          aws lambda update-function-code \
            --function-name resume-parser-production-worker \
            --image-uri ${{ needs.build-and-push.outputs.image_uri }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Worker Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name resume-parser-production-worker \
            --region ${{ env.AWS_REGION }}

      # The live functions ran at the AWS default 128 MB — too little for the
      # cold-start imports (PyMuPDF, Pillow, openai, boto3) → Runtime.OutOfMemory
      # + init timeout → HTTP 502. The deploy only updates code, so configuration
      # drift persists. Enforce the intended sizing (matches Terraform) here.
      # Also pin the image CMD per function: the shared image defaults to the API
      # handler, so the Worker MUST override its command to the worker handler.
      - name: Ensure Lambda sizing & handlers (match Terraform)
        run: |
          REGION=${{ env.AWS_REGION }}

          echo "Configuring API Lambda (1024 MB / 29 s / API handler)"
          aws lambda update-function-configuration \
            --function-name resume-parser-production-api \
            --memory-size 1024 \
            --timeout 29 \
            --image-config '{"Command":["app.handlers.lambda_handler.handler"]}' \
            --region "$REGION"
          aws lambda wait function-updated \
            --function-name resume-parser-production-api --region "$REGION"

          echo "Configuring Worker Lambda (2048 MB / 300 s / worker handler)"
          aws lambda update-function-configuration \
            --function-name resume-parser-production-worker \
            --memory-size 2048 \
            --timeout 300 \
            --image-config '{"Command":["app.handlers.worker_lambda.handler"]}' \
            --region "$REGION"
          aws lambda wait function-updated \
            --function-name resume-parser-production-worker --region "$REGION"

      - name: Ensure API Function URL + public-invoke permission exist
        run: |
          FN=resume-parser-production-api

          # 1. Ensure the Function URL config exists (AuthType=NONE).
          if ! aws lambda get-function-url-config \
                --function-name "$FN" --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "Function URL missing — creating it"
            aws lambda create-function-url-config \
              --function-name "$FN" \
              --auth-type NONE \
              --region ${{ env.AWS_REGION }}
          fi

          # 2. Ensure the resource-based permission allowing public invoke exists.
          #    Without this an AuthType=NONE URL returns HTTP 403. add-permission is
          #    idempotent here: a pre-existing statement throws ResourceConflictException,
          #    which we treat as success.
          if aws lambda add-permission \
                --function-name "$FN" \
                --statement-id FunctionURLAllowPublicAccess \
                --action lambda:InvokeFunctionUrl \
                --principal '*' \
                --function-url-auth-type NONE \
                --region ${{ env.AWS_REGION }} 2>err.txt; then
            echo "Public-invoke permission created"
          elif grep -q ResourceConflictException err.txt; then
            echo "Public-invoke permission already present — ok"
          else
            cat err.txt
            exit 1
          fi

      - name: Smoke test — health check
        id: smoke
        run: |
          API_URL=$(aws lambda get-function-url-config \
            --function-name resume-parser-production-api \
            --query FunctionUrl --output text --region ${{ env.AWS_REGION }})
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

          # Retry briefly — URL/permission changes can take a few seconds to propagate.
          STATUS=000
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o body.txt -w "%{http_code}" "${API_URL}api/v1/health")
            [ "$STATUS" = "200" ] && break
            echo "Attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            echo "--- response body ---"
            cat body.txt || true
            echo ""
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      - name: Diagnose on failure — dump Lambda logs + config
        if: failure()
        run: |
          FN=resume-parser-production-api
          echo "::group::Lambda configuration"
          aws lambda get-function-configuration \
            --function-name "$FN" --region ${{ env.AWS_REGION }} \
            --query '{Handler:Handler,ImageConfig:ImageConfigResponse,State:State,LastUpdateStatus:LastUpdateStatus,LastUpdateStatusReason:LastUpdateStatusReason}' \
            || true
          echo "::endgroup::"

          echo "::group::Recent CloudWatch logs (last 15m)"
          # The cold-start traceback behind a 502 lands here (Runtime.ImportModuleError, etc.)
          aws logs tail "/aws/lambda/$FN" \
            --since 15m --format short --region ${{ env.AWS_REGION }} \
            || echo "No log group access / no recent events"
          echo "::endgroup::"

          echo "::group::Direct invoke (captures init/import errors in the payload)"
          # Minimal API Gateway HTTP-API v2.0 event for GET /api/v1/health.
          # Only needs lambda:InvokeFunction. On an import error the response
          # payload contains errorMessage + stackTrace.
          printf '%s' '{"version":"2.0","routeKey":"$default","rawPath":"/api/v1/health","rawQueryString":"","headers":{"host":"diag.local"},"requestContext":{"http":{"method":"GET","path":"/api/v1/health","protocol":"HTTP/1.1","sourceIp":"127.0.0.1"}},"isBase64Encoded":false}' > event.json
          aws lambda invoke \
            --function-name "$FN" \
            --payload fileb://event.json \
            --region ${{ env.AWS_REGION }} \
            invoke-response.json \
            || echo "invoke call failed"
          echo "--- invoke response payload ---"
          cat invoke-response.json || true
          echo ""
          echo "::endgroup::"

      - name: Get API URL
        id: get-url
        run: |
          API_URL=$(aws lambda get-function-url-config \
            --function-name resume-parser-production-api \
            --query FunctionUrl --output text --region ${{ env.AWS_REGION }})
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "### Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ needs.build-and-push.outputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** ${{ steps.get-url.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
