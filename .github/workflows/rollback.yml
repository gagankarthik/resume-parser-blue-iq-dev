name: Rollback Production Lambda

# Manual rollback: repoint the production Lambda at a previously-built image tag
# (a prior commit SHA) without rebuilding. Every deploy pushes an image tagged with
# its commit SHA to ECR, so any past deploy can be restored in ~1 minute.
#
# Usage: Actions -> "Rollback Production Lambda" -> Run workflow -> enter the commit SHA
# (the `image_tag`) to roll back to. Find good SHAs under the deploy workflow's runs.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to roll back to (the target commit SHA, full or the tag as pushed by deploy.yml)"
        required: true
        type: string

concurrency:
  # Never let a rollback and a deploy (or two rollbacks) race on the same function.
  group: deploy-production-lambda
  cancel-in-progress: false

env:
  AWS_REGION:           us-east-2
  ECR_REPO_NAME:        resume-parser-production-lambda
  FUNCTION_NAME:        resume-parser-production-api
  WORKER_FUNCTION_NAME: resume-parser-production-worker

permissions:
  contents: read

jobs:
  rollback:
    name: Rollback to ${{ inputs.image_tag }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.get-url.outputs.api_url }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify target image exists in ECR
        run: |
          if ! aws ecr describe-images \
            --repository-name "${{ env.ECR_REPO_NAME }}" \
            --image-ids imageTag="${{ inputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
            echo "::error::No image tagged '${{ inputs.image_tag }}' in ${{ env.ECR_REPO_NAME }}. Pick a tag from a past deploy run (its commit SHA)."
            exit 1
          fi
          echo "Found image ${{ env.ECR_REPO_NAME }}:${{ inputs.image_tag }}"

      - name: Record current image (for audit / re-rollback)
        run: |
          CURRENT=$(aws lambda get-function-configuration \
            --function-name "${{ env.FUNCTION_NAME }}" \
            --query 'ImageUri' --output text --region "${{ env.AWS_REGION }}")
          echo "Rolling back FROM: $CURRENT"
          echo "Rolling back TO:   ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ inputs.image_tag }}"

      # Both functions share the image, so roll back both to the same tag - else
      # the API and Worker would drift onto different code versions.
      - name: Update Lambda image (API + Worker)
        run: |
          IMG="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ inputs.image_tag }}"
          for FN in "${{ env.FUNCTION_NAME }}" "${{ env.WORKER_FUNCTION_NAME }}"; do
            if aws lambda get-function --function-name "$FN" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
              aws lambda update-function-code --function-name "$FN" --image-uri "$IMG" --region "${{ env.AWS_REGION }}"
            else
              echo "::warning::$FN not found - skipping (async worker not provisioned)."
            fi
          done

      - name: Wait for Lambda update (API + Worker)
        run: |
          for FN in "${{ env.FUNCTION_NAME }}" "${{ env.WORKER_FUNCTION_NAME }}"; do
            if aws lambda get-function --function-name "$FN" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1; then
              aws lambda wait function-updated --function-name "$FN" --region "${{ env.AWS_REGION }}"
            fi
          done

      - name: Smoke test - health check
        id: get-url
        run: |
          API_URL=$(aws lambda get-function-url-config \
            --function-name "${{ env.FUNCTION_NAME }}" \
            --query FunctionUrl --output text --region "${{ env.AWS_REGION }}")
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

          STATUS=000
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o body.txt -w "%{http_code}" "${API_URL}api/v1/health")
            [ "$STATUS" = "200" ] && break
            echo "Attempt $i: HTTP $STATUS - retrying in 5s"
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed after rollback: HTTP $STATUS"
            cat body.txt || true
            exit 1
          fi
          echo "Health check passed: HTTP $STATUS"

      - name: Summary
        run: |
          echo "### Rollback Complete ↩️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Function:** \`${{ env.FUNCTION_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Now running image tag:** \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** ${{ steps.get-url.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
