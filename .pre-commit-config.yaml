# Pre-commit hooks - run ruff (auto-fix) and mypy locally before every commit.
# Install once:
#   pip install pre-commit
#   pre-commit install
# After that, every `git commit` runs these checks and auto-fixes what it can.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      # Auto-fix import sorting, unused imports, etc. before commit
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        # Bundled reference-data snapshots (specialty/facility/geography catalogs)
        # are legitimately large; exclude them so the guard still protects the rest.
        exclude: ^app/data/.*\.json$
      - id: detect-private-key   # block accidental PEM/private-key commits

  # Secret scanning - catches API keys / tokens (OpenAI sk-, hex keys, AWS keys)
  # that detect-private-key (PEM only) misses. Defense-in-depth on top of .gitignore.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
