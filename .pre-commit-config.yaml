# Pre-commit hooks — run ruff (auto-fix) and mypy locally before every commit.
# Install once:
#   pip install pre-commit
#   pre-commit install
# After that, every `git commit` runs these checks and auto-fixes what it can.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      # Auto-fix import sorting, unused imports, etc. before commit
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key   # block accidental key commits
